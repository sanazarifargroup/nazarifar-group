<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b0a09" />
    <meta
      name="description"
      content="Nazarifar Group — Architecture, Supply, Services and Custom Machines"
    />
    <title>Nazarifar Group</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="cinematic" aria-label="Nazarifar Group">
      <div class="scene" aria-hidden="true">
        <img id="scene-image" class="scene__image" alt="" />
        <div class="scene__shade"></div>
      </div>

      <a class="brand" href="#holding" data-scene="holding" aria-label="Nazarifar Group home">
        <span class="brand__logo-frame">
          <img
            class="brand__logo"
            src="na-logo-transparent.png"
            alt="Nazarifar Group"
            width="1403"
            height="1121"
          />
        </span>
        <span class="brand__name">Nazarifar Group</span>
      </a>

      <nav class="scene-nav" aria-label="Business units and information">
        <button type="button" data-scene="architecture">Architecture</button>
        <button type="button" data-scene="supply">Supply</button>
        <button type="button" data-scene="services">Services</button>
        <button type="button" data-scene="custom-machines">Custom Machines</button>
        <button type="button" data-scene="about">About</button>
        <button type="button" data-scene="contact">Contact</button>
      </nav>

      <div class="loading" aria-hidden="true"></div>
      <p class="status" role="status" aria-live="polite"></p>
    </main>

    <noscript>This website requires JavaScript.</noscript>
    <script src="script.js"></script>
  </body>
</html>
