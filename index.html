<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta
      name="description"
      content="Nazarifar Group — Architecture, Supply, Services, and Custom Machines."
    />
    <meta name="theme-color" content="#15120e" />
    <title>Nazarifar Group</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="site-shell">
      <section class="hero" aria-labelledby="page-title">
        <h1 id="page-title" class="sr-only">Nazarifar Group</h1>

        <img
          class="hero__image"
          src="hero-architecture.jpg"
          alt="Nazarifar Group interior project"
          fetchpriority="high"
          decoding="async"
        />

        <div class="hero__shade" aria-hidden="true"></div>

        <div class="brand-lockup" aria-label="Nazarifar Group">
          <div class="brand-mark" aria-hidden="true"></div>
          <span class="brand-name">Nazarifar Group</span>
        </div>

        <div class="hero__content">
          <ul class="business-units" aria-label="Business units">
            <li>Architecture</li>
            <li>Supply</li>
            <li>Services</li>
            <li>Custom Machines</li>
          </ul>

          <nav class="secondary-links" aria-label="Company information">
            <a href="#about">About</a>
            <a href="#contact">Contact</a>
          </nav>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
